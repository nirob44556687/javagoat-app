<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { background: #0b0e1e; color: #fff; text-align: center; font-family: sans-serif; padding: 40px 20px; }
    .dice { width: 120px; height: 120px; background: #fff; border-radius: 20px; margin: 30px auto; font-size: 60px; line-height: 120px; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .btn { background: #FFD600; padding: 20px; border-radius: 50px; border: none; font-weight: bold; width: 85%; font-size: 18px; color: #000; cursor: pointer; }
    .msg { color: #f5a623; margin-top: 20px; font-weight: bold; }
</style></head><body>
    <h2 style="color:#FFD600">LUDO CHAMPION 🎲</h2>
    <div id="dice" class="dice">?</div>
    <button class="btn" onclick="roll()">ছক্কা মারুন (Roll)</button>
    <div id="msg" class="msg"></div>
    <script>
        function roll() {
            let val = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice').innerText = val;
            if(val === 6) { 
                document.getElementById('msg').innerText = "অভিনন্দন! আপনি ৫০৳ জিতেছেন!";
                Android.onWin(50); 
            } else {
                document.getElementById('msg').innerText = "আবার চেষ্টা করুন!";
            }
        }
    </script>
</body></html>
